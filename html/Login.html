<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portfolio Admin</title>
    <link rel="stylesheet" href="../css/base/variables.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-page">
    <main class="login-container">
        <section class="login-card">
            <h1>Login</h1>
            <p>Đăng nhập để vào khu vực quản trị nội dung.</p>

            <div class="demo-accounts">
                <p class="demo-title">Tài khoản Demo có sẵn:</p>
                <table class="accounts-table">
                    <tr>
                        <th>Email</th>
                        <th>Mật khẩu</th>
                    </tr>
                    <tr>
                        <td>admin@gmail.com</td>
                        <td>admin123</td>
                    </tr>
                </table>
            </div>

            <form class="login-form">
                <label>
                    Email
                    <input type="email" placeholder="admin@portfolio.com" required>
                </label>
                <label>
                    Mật khẩu
                    <input type="password" placeholder="••••••••" required>
                </label>
                <a class="button" href="Admin.html">Đăng nhập</a>
                <a class="button button-secondary" href="index.html">Quay lại Trang chính</a>

            </form>

        </section>
    </main>
</body>

</html>
