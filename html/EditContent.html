<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa nội dung - Admin</title>
    <link rel="stylesheet" href="../css/base/variables.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="admin-header">
        <div class="container admin-topbar">
            <div>
                <h1>Chỉnh sửa nội dung</h1>
                <p>Cập nhật thông tin trên trang chính</p>
            </div>
            <a class="button button-outline" href="Admin.html">Quay lại Admin</a>
        </div>
    </header>

    <main class="container edit-main">
        <div class="edit-tabs">
            <a href="#section-about" class="tab-link active">About</a>
            <a href="#section-projects" class="tab-link">Projects</a>
            <a href="#section-contact" class="tab-link">Contact</a>
        </div>

        <!-- ── ABOUT ──────────────────────────────────────── -->
        <section class="edit-section" id="section-about">
            <h2>Chỉnh sửa - Giới thiệu</h2>

            <!-- toast thông báo lưu thành công -->
            <div class="save-toast" id="toast-about">✓ Đã lưu thành công!</div>

            <form class="edit-form" id="form-about">
                <label>
                    Mô tả ngắn
                    <textarea id="f-about-desc" rows="3" placeholder="Nhập mô tả ngắn về bản thân..."></textarea>
                </label>
                <label>
                    Kỹ năng 1
                    <input id="f-skill-1" type="text" placeholder="VD: HTML5">
                </label>
                <label>
                    Kỹ năng 2
                    <input id="f-skill-2" type="text" placeholder="VD: CSS3">
                </label>
                <label>
                    Kỹ năng 3
                    <input id="f-skill-3" type="text" placeholder="VD: Responsive Design">
                </label>
                <label>
                    Kỹ năng 4
                    <input id="f-skill-4" type="text" placeholder="VD: Layout Flexbox / Grid">
                </label>
                <label>
                    Giá trị cốt lõi
                    <textarea id="f-about-values" rows="3" placeholder="Nhập giá trị của bạn..."></textarea>
                </label>
                <button type="submit" class="button">Lưu thay đổi</button>
            </form>
        </section>

        <!-- ── PROJECTS ───────────────────────────────────── -->
        <section class="edit-section" id="section-projects">
            <h2>Chỉnh sửa - Dự án</h2>
            <div class="save-toast" id="toast-projects">✓ Đã lưu thành công!</div>

            <form class="edit-form" id="form-projects">
                <div class="project-item">
                    <h3>Dự án 1</h3>
                    <label>
                        Tiêu đề
                        <input id="f-p1-title" type="text" placeholder="Portfolio cá nhân">
                    </label>
                    <label>
                        Mô tả
                        <textarea id="f-p1-desc" rows="2" placeholder="Mô tả dự án..."></textarea>
                    </label>
                </div>

                <div class="project-item">
                    <h3>Dự án 2</h3>
                    <label>
                        Tiêu đề
                        <input id="f-p2-title" type="text" placeholder="Landing Page">
                    </label>
                    <label>
                        Mô tả
                        <textarea id="f-p2-desc" rows="2" placeholder="Mô tả dự án..."></textarea>
                    </label>
                </div>

                <div class="project-item">
                    <h3>Dự án 3</h3>
                    <label>
                        Tiêu đề
                        <input id="f-p3-title" type="text" placeholder="Dashboard mẫu">
                    </label>
                    <label>
                        Mô tả
                        <textarea id="f-p3-desc" rows="2" placeholder="Mô tả dự án..."></textarea>
                    </label>
                </div>

                <button type="submit" class="button">Lưu thay đổi</button>
            </form>
        </section>

        <!-- ── CONTACT ────────────────────────────────────── -->
        <section class="edit-section" id="section-contact">
            <h2>Chỉnh sửa - Liên hệ</h2>
            <div class="save-toast" id="toast-contact">✓ Đã lưu thành công!</div>

            <form class="edit-form" id="form-contact">
                <label>
                    Email
                    <input id="f-contact-email" type="email" placeholder="your@email.com">
                </label>
                <label>
                    Số điện thoại
                    <input id="f-contact-phone" type="tel" placeholder="+84 123 456 789">
                </label>
                <label>
                    Mô tả liên hệ
                    <textarea id="f-contact-desc" rows="3" placeholder="Nhập thông tin bổ sung..."></textarea>
                </label>
                <button type="submit" class="button">Lưu thay đổi</button>
            </form>
        </section>
    </main>

    <style>
        /* Toast notification */
        .save-toast {
            display: none;
            background: #22c55e;
            color: #fff;
            padding: 0.65rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            width: fit-content;
        }

        .save-toast.show {
            display: block;
            animation: fadeOut 2.5s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            70% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                display: none;
            }
        }
    </style>

    <script src="../js/edit.js"></script>
</body>

</html>
